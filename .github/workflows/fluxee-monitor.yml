name: Fluxee Monitor

on:
  schedule:
    - cron: '0 8 * * *'
    - cron: '0 20 * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Run Fansly health checks and push results
        env:
          GITHUB_TOKEN: ${{ secrets.MONITOR_TOKEN }}
        run: |
          python3 - << 'PYEOF'
          import urllib.request
          import urllib.error
          import json
          import time
          import base64
          import os
          from datetime import datetime, timezone

          TOKEN = os.environ['GITHUB_TOKEN']
          REPO  = 'palloxdg/palloxdg.github.io'
          FILE  = 'monitor-status.json'
          UA    = 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'

          def check(name, url):
              req = urllib.request.Request(url, headers={'User-Agent': UA})
              start = time.time()
              try:
                  with urllib.request.urlopen(req, timeout=10) as r:
                      code = r.status
              except urllib.error.HTTPError as e:
                  code = e.code
              except Exception:
                  code = 0
              ms = int((time.time() - start) * 1000)
              ok = 200 <= code < 500
              return {'name': name, 'status': 'ok' if ok else 'error', 'code': code, 'ms': ms}

          checks = [
              check('Fansly Website', 'https://fansly.com'),
              check('Fansly API',     'https://apiv3.fansly.com/api/v1/account/notificationscount'),
              check('GitHub Status',  'https://palloxdg.github.io/status.json'),
          ]

          try:
              req = urllib.request.Request('https://palloxdg.github.io/status.json', headers={'User-Agent': UA})
              with urllib.request.urlopen(req, timeout=10) as r:
                  s = json.loads(r.read())
              fluxee_version = s.get('version', 'unknown')
              fluxee_status  = s.get('status',  'unknown')
          except Exception:
              fluxee_version = 'unknown'
              fluxee_status  = 'unknown'

          overall = 'error' if any(c['status'] == 'error' for c in checks) else 'ok'
          now = datetime.now(timezone.utc)

          payload = {
              'overall':        overall,
              'checkedAt':      now.strftime('%Y-%m-%dT%H:%M:%SZ'),
              'checkedAtHuman': now.strftime('%Y-%m-%d %H:%M UTC'),
              'fluxeeVersion':  fluxee_version,
              'fluxeeStatus':   fluxee_status,
              'checks':         checks,
          }

          content = base64.b64encode(json.dumps(payload, indent=2).encode()).decode()

          api = f'https://api.github.com/repos/{REPO}/contents/{FILE}'
          headers = {
              'Authorization': f'token {TOKEN}',
              'Accept': 'application/vnd.github.v3+json',
              'Content-Type': 'application/json',
          }

          sha = ''
          try:
              req = urllib.request.Request(api, headers=headers)
              with urllib.request.urlopen(req) as r:
                  sha = json.loads(r.read()).get('sha', '')
          except Exception:
              pass

          body = {'message': f'Monitor check: {payload["checkedAtHuman"]}', 'content': content}
          if sha:
              body['sha'] = sha

          req = urllib.request.Request(api, data=json.dumps(body).encode(), headers=headers, method='PUT')
          with urllib.request.urlopen(req) as r:
              result = json.loads(r.read())
              print(f'Pushed: {result.get("content", {}).get("name", "ok")}')

          print(f'Overall: {overall}')
          for c in checks:
              print(f'  {c["name"]}: {c["status"]} ({c["code"]}, {c["ms"]}ms)')
          PYEOF
