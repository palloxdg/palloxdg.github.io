name: Fluxee Monitor

on:
  schedule:
    - cron: '0 8 * * *'   # 08:00 UTC daily
    - cron: '0 20 * * *'  # 20:00 UTC daily
  workflow_dispatch:       # Manual trigger from GitHub Actions tab

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Check Fansly and update monitor status
        env:
          GITHUB_TOKEN: ${{ secrets.MONITOR_TOKEN }}
        run: |
          # ── Helper function ──────────────────────────────────────────────
          check_url() {
            local name="$1"
            local url="$2"
            local start=$(date +%s%3N)
            local http_code=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 10 \
              --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
              "$url")
            local end=$(date +%s%3N)
            local ms=$((end - start))

            if [ "$http_code" -ge 200 ] && [ "$http_code" -lt 500 ]; then
              echo "{\"name\":\"$name\",\"status\":\"ok\",\"code\":$http_code,\"ms\":$ms}"
            else
              echo "{\"name\":\"$name\",\"status\":\"error\",\"code\":$http_code,\"ms\":$ms}"
            fi
          }

          # ── Run checks ───────────────────────────────────────────────────
          FANSLY_WEB=$(check_url "Fansly Website" "https://fansly.com")
          FANSLY_API=$(check_url "Fansly API" "https://apiv3.fansly.com/api/v1/account/notificationscount")
          GITHUB_STATUS=$(check_url "GitHub Status JSON" "https://palloxdg.github.io/status.json")

          # ── Read current status.json for version info ────────────────────
          STATUS_JSON=$(curl -s --max-time 10 "https://palloxdg.github.io/status.json" || echo "{}")
          FLUXEE_VERSION=$(echo "$STATUS_JSON" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('version','unknown'))" 2>/dev/null || echo "unknown")
          FLUXEE_STATUS=$(echo "$STATUS_JSON"  | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('status','unknown'))"  2>/dev/null || echo "unknown")

          # ── Determine overall health ─────────────────────────────────────
          OVERALL="ok"
          for CHECK in "$FANSLY_WEB" "$FANSLY_API" "$GITHUB_STATUS"; do
            STATUS=$(echo "$CHECK" | python3 -c "import sys,json; print(json.load(sys.stdin)['status'])")
            if [ "$STATUS" = "error" ]; then
              OVERALL="error"
              break
            fi
          done

          # ── Build monitor-status.json ────────────────────────────────────
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          TIMESTAMP_HUMAN=$(date -u +"%Y-%m-%d %H:%M UTC")

          cat > monitor-status.json << EOF
          {
            "overall": "$OVERALL",
            "checkedAt": "$TIMESTAMP",
            "checkedAtHuman": "$TIMESTAMP_HUMAN",
            "fluxeeVersion": "$FLUXEE_VERSION",
            "fluxeeStatus": "$FLUXEE_STATUS",
            "checks": [
              $FANSLY_WEB,
              $FANSLY_API,
              $GITHUB_STATUS
            ]
          }
          EOF

          # ── Push to GitHub Pages repo ────────────────────────────────────
          # Get current file SHA (needed for update)
          SHA=$(curl -s \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/palloxdg/palloxdg.github.io/contents/monitor-status.json" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('sha',''))" 2>/dev/null || echo "")

          CONTENT=$(base64 -w 0 monitor-status.json)

          if [ -n "$SHA" ]; then
            # File exists — update it
            curl -s -X PUT \
              -H "Authorization: token $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/palloxdg/palloxdg.github.io/contents/monitor-status.json" \
              -d "{\"message\":\"Monitor check: $TIMESTAMP_HUMAN\",\"content\":\"$CONTENT\",\"sha\":\"$SHA\"}"
          else
            # File doesn't exist — create it
            curl -s -X PUT \
              -H "Authorization: token $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/palloxdg/palloxdg.github.io/contents/monitor-status.json" \
              -d "{\"message\":\"Monitor check: $TIMESTAMP_HUMAN\",\"content\":\"$CONTENT\"}"
          fi

          echo "Monitor check complete: $OVERALL at $TIMESTAMP_HUMAN"
          echo "Fansly Web: $FANSLY_WEB"
          echo "Fansly API: $FANSLY_API"
          echo "GitHub Status: $GITHUB_STATUS"
