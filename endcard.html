<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fluxee – End Card</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: transparent; font-family: 'Segoe UI', sans-serif; overflow: hidden; width: 1920px; height: 1080px; position: relative; }

    #ec-wrap {
      position: absolute; width: 480px; transform-origin: top left;
      padding: 22px 24px 24px;
      background: rgba(0,0,0,0.82); border: 1px solid rgba(0,229,255,0.3);
      border-radius: 16px; backdrop-filter: blur(12px);
      box-shadow: 0 0 40px rgba(0,229,255,0.15);
    }
    #ec-inner {
      animation: ecIn 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes ecIn {
      from { opacity:0; transform: scale(0.92) translateY(12px); }
      to   { opacity:1; transform: scale(1) translateY(0); }
    }

    #ec-title {
      font-size: 11px; font-weight: 800; letter-spacing: 3px; text-transform: uppercase;
      color: #00e5ff; text-shadow: 0 0 10px rgba(0,229,255,0.6);
      text-align: center; margin-bottom: 18px;
    }
    .ec-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
    .ec-stat { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; padding: 12px 14px; text-align: center; }
    .ec-stat-value { font-size: 22px; font-weight: 800; color: #fff; line-height: 1; margin-bottom: 4px; }
    .ec-stat-value.cyan { color: #00e5ff; text-shadow: 0 0 8px rgba(0,229,255,0.5); }
    .ec-stat-label { font-size: 10px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: #666; }

    #ec-top-tipper {
      background: rgba(255,215,0,0.06); border: 1px solid rgba(255,215,0,0.2);
      border-radius: 10px; padding: 10px 14px;
      display: flex; align-items: center; gap: 10px; margin-bottom: 12px;
    }
    #ec-top-tipper .crown { font-size: 20px; }
    #ec-top-tipper .info  { flex: 1; }
    #ec-top-tipper .name  { font-size: 15px; font-weight: 700; color: #ffd700; }
    #ec-top-tipper .amt   { font-size: 12px; color: #aaa; }

    #ec-ht-summary {
      background: rgba(0,229,255,0.04); border: 1px solid rgba(0,229,255,0.12);
      border-radius: 10px; padding: 10px 14px;
      font-size: 12px; color: #aaa; display: none;
    }
    #ec-ht-summary.visible { display: block; }
    #ec-ht-summary span { color: #00e5ff; font-weight: 700; }

    #ec-footer { margin-top: 14px; text-align: center; font-size: 13px; font-weight: 600; color: #ccc; }
  </style>
</head>
<body>
  <div id="ec-wrap">
  <div id="ec-inner">
    <div id="ec-title">📊 Stream Recap</div>
    <div class="ec-grid">
      <div class="ec-stat">
        <div class="ec-stat-value cyan" id="ec-total">$0.00</div>
        <div class="ec-stat-label">Total Tips</div>
      </div>
      <div class="ec-stat">
        <div class="ec-stat-value" id="ec-count">0</div>
        <div class="ec-stat-label">Tip Count</div>
      </div>
    </div>
    <div id="ec-top-tipper">
      <div class="crown">👑</div>
      <div class="info">
        <div class="name" id="ec-top-name">—</div>
        <div class="amt"  id="ec-top-amt">Top Tipper</div>
      </div>
    </div>
    <div id="ec-ht-summary">
      🚂 Hype Train reached <span id="ec-ht-level">0</span> level(s) —
      <span id="ec-ht-tips">0</span> tips collected
    </div>
    <div id="ec-footer">Thank you for watching! 💙</div>
  </div>
  </div>

  <script>
    const WS_URL  = `ws://${location.host}?sid=ec-${Math.random().toString(36).slice(2)}`;
    const API_URL = `http://${location.host}/state/endcard`;

    async function fetchState() {
      try {
        const r = await fetch(API_URL);
        const s = await r.json();
        applyLayout(s.config || {});
        applyVisuals(s.config || {});
        showCard(s.summary || {}, s.config || {});
      } catch(e) {}
    }

    function showCard(summary, config) {
      document.getElementById('ec-total').textContent = '$' + (+(summary.totalAmount || 0)).toFixed(2);
      document.getElementById('ec-count').textContent = summary.tipCount || 0;

      // Thank you message — driven by config, not hardcoded
      document.getElementById('ec-footer').textContent = config.thankYou || 'Thank you for watching! 💙';

      const top = summary.topTipper;
      if (top && top.username) {
        document.getElementById('ec-top-name').textContent = top.username;
        document.getElementById('ec-top-amt').textContent  = '$' + (+(top.total || 0)).toFixed(2);
      } else {
        document.getElementById('ec-top-name').textContent = '—';
        document.getElementById('ec-top-amt').textContent  = 'Top Tipper';
      }

      const htEl = document.getElementById('ec-ht-summary');
      if (config.showHypeTrain && summary.hypeTrain) {
        document.getElementById('ec-ht-level').textContent = summary.hypeTrain.maxLevel || 0;
        document.getElementById('ec-ht-tips').textContent  = summary.hypeTrain.totalTips || 0;
        htEl.classList.add('visible');
      } else {
        htEl.classList.remove('visible');
      }
    }

    function applyVisuals(cfg) {
      const wrap = document.getElementById('ec-wrap');
      if (!wrap) return;
      if (cfg.font) wrap.style.fontFamily = `'${cfg.font}', sans-serif`;
      // Apply fontColor to child elements explicitly — they have hardcoded CSS colors
      if (cfg.fontColor) {
        wrap.style.color = cfg.fontColor;
        document.getElementById('ec-footer').style.color = cfg.fontColor;
      }
      if (cfg.borderColor) wrap.style.borderColor = cfg.borderColor;
      if (cfg.accentColor) {
        wrap.querySelectorAll('.ec-stat-value.cyan').forEach(el => { el.style.color = cfg.accentColor; });
      }
      if (cfg.background === 'transparent') {
        wrap.style.background     = 'transparent';
        wrap.style.backdropFilter = 'none';
        wrap.style.border         = 'none';
      } else if (cfg.background === 'solid' && cfg.bgColor) {
        wrap.style.background = cfg.bgColor;
      } else {
        wrap.style.background     = 'rgba(0,0,0,0.82)';
        wrap.style.backdropFilter = 'blur(10px)';
      }
    }

    function applyLayout(cfg) {
      const el  = document.getElementById('ec-wrap');
      if (!el) return;
      const pos   = cfg.position || 'bottom-center';
      const scale = (cfg.scale || 100) / 100;
      const pad   = 20;
      const positions = {
        'top-left':      { top: pad,    left: pad,   bottom:'auto', right:'auto' },
        'top-center':    { top: pad,    left:'50%',  bottom:'auto', right:'auto', translateX:'-50%' },
        'top-right':     { top: pad,    right: pad,  bottom:'auto', left:'auto'  },
        'bottom-left':   { bottom: pad, left: pad,   top:'auto',    right:'auto' },
        'bottom-center': { bottom: pad, left:'50%',  top:'auto',    right:'auto', translateX:'-50%' },
        'bottom-right':  { bottom: pad, right: pad,  top:'auto',    left:'auto'  },
      };
      const p = positions[pos] || positions['bottom-center'];
      el.style.top    = p.top    !== undefined ? (typeof p.top    === 'number' ? p.top    + 'px' : p.top)    : '';
      el.style.bottom = p.bottom !== undefined ? (typeof p.bottom === 'number' ? p.bottom + 'px' : p.bottom) : '';
      el.style.left   = p.left   !== undefined ? (typeof p.left   === 'number' ? p.left   + 'px' : p.left)   : '';
      el.style.right  = p.right  !== undefined ? (typeof p.right  === 'number' ? p.right  + 'px' : p.right)  : '';
      const tx     = p.translateX || '0';
      const origin = pos.includes('bottom') ? 'bottom' : 'top';
      const oX     = p.translateX ? 'center' : (pos.includes('right') ? 'right' : 'left');
      el.style.transformOrigin = `${oX} ${origin}`;
      el.style.transform       = `translateX(${tx}) scale(${scale})`;
    }

    let wsReconnectAttempts = 0;
    let heartbeatInterval   = null;
    const WS_RECONNECT_BASE = 1000;
    const WS_RECONNECT_MAX  = 30000;

    function wsReconnectDelay() {
      const d = Math.min(WS_RECONNECT_BASE * Math.pow(2, wsReconnectAttempts), WS_RECONNECT_MAX);
      wsReconnectAttempts++;
      return d;
    }

    function connectWS() {
      const ws = new WebSocket(WS_URL);
      ws.onmessage = (e) => {
        try {
          const ev = JSON.parse(e.data);
          if (ev.type === 'end_card_config_updated') {
            applyLayout(ev);
            applyVisuals(ev);
            showCard(ev.summary || {}, ev);
          } else if (ev.type === 'end_card_summary_updated') {
            // Background.js pushes updated summary on every tip — re-fetch to stay in sync
            fetchState();
          }
        } catch(err) {}
      };
      ws.onopen  = () => {
        wsReconnectAttempts = 0;
        clearInterval(heartbeatInterval);
        heartbeatInterval = setInterval(() => {
          if (ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type:'ping' }));
        }, 12000);
      };
      ws.onclose = () => {
        clearInterval(heartbeatInterval);
        setTimeout(connectWS, wsReconnectDelay());
      };
    }

    if (new URLSearchParams(location.search).get('preview') === '1') {
      const previewSummary = { totalAmount: 2380.00, tipCount: 42, topTipper: { username: 'BigTipper', total: 500.00 }, hypeTrain: { maxLevel: 3, totalTips: 42 } };
      const previewConfig  = { thankYou: 'Thanks for an amazing stream! 💖', showHypeTrain: true, showTips: true, showAmount: true, showTopTipper: true, position: 'bottom-center', scale: 100 };
      applyLayout(previewConfig);
      applyVisuals(previewConfig);
      showCard(previewSummary, previewConfig);
    } else {
      fetchState();
      connectWS();
    }
  </script>
</body>
</html>
