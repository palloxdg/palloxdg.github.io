<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Fluxee Overlay</title>
    <link rel="stylesheet" href="overlay.css">
    <!-- Preload common theme fonts so they're ready before the train starts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;700&family=Bebas+Neue&family=Share+Tech+Mono&display=swap" rel="stylesheet">
</head>

<body>
    <!-- Animation container — horizontally centered, slightly above vertical center -->
    <div id="overlay-container">
        <video id="anim-player" playsinline></video>
    </div>

    <div id="ws-status" class="ws-status disconnected">⚠ Relay not connected</div>

    <!-- 🚂 Hype Train Console -->
    <div id="hype-train-container">
        <!-- Background image layer — sits behind all content, inside the border -->
        <div id="ht-bg-layer"></div>
        <div class="train-header">
            <span class="title"><span class="train-icon">🚂</span> HYPE TRAIN</span>
            <span class="level">LVL <span class="level-val">1</span></span>
        </div>
        <div class="progress-track">
            <div class="progress-bar"></div>
        </div>
        <div class="train-footer">
            <span class="tips-info"><span class="tips-val">0 / 5</span> TIPS</span>
            <span class="timer"><span class="timer-val">05:00</span></span>
        </div>
    </div>

    <script src="overlay.js"></script>
    <script src="hypeTrainRenderer.js?v=2"></script>
    <script>
    // Dynamically load Google Fonts as themes request them
    const _loadedFonts = new Set();
    function ensureFontLoaded(fontName) {
        if (!fontName || _loadedFonts.has(fontName)) return;
        _loadedFonts.add(fontName);
        const link = document.createElement('link');
        link.rel = 'stylesheet';
        link.href = `https://fonts.googleapis.com/css2?family=${fontName.replace(/ /g, '+')}:wght@400;700;900&display=swap`;
        document.head.appendChild(link);
    }
    // Patch renderer to call ensureFontLoaded whenever a font is applied
    window.addEventListener('load', () => {
        if (typeof hypeTrainRenderer !== 'undefined') {
            const origUpdate = hypeTrainRenderer.update.bind(hypeTrainRenderer);
            hypeTrainRenderer.update = function(state) {
                if (state.config && state.config.font) ensureFontLoaded(state.config.font);
                origUpdate(state);
            };
        }
    });
    </script>

</body>

</html>
